<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;--surface:#131a2b;--surface2:#1a2340;--surface3:#222d4a;

body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.header{background:linear-gradient(180deg,#1a2340 0%,#0d1220 100%);border-bottom:3px solid var(--accent);padding:16px 24px;position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.title{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;text-transform:uppercase;letter-spacing:2px;background:linear-gradient(90deg,#ff6b35,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.title span{font-size:14px;font-weight:400;letter-spacing:1px;display:block;-webkit-text-fill-color:var(--text2)}
.status-bar{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--text2)}
.btn{font-family:'Source Sans 3',sans-serif;font-size:12px;font-weight:600;padding:6px 14px;border-radius:6px;border:1px solid var(--surface3);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .2s}
.btn:hover{background:var(--surface3);color:var(--text)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent2)}
.container{max-width:1200px;margin:0 auto;padding:20px}
.tabs{display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid var(--surface3);padding-bottom:12px;overflow-x:auto}
.tab{font-family:'Oswald',sans-serif;font-size:15px;font-weight:500;text-transform:uppercase;letter-spacing:1.5px;padding:8px 16px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.standings-table{width:100%;border-collapse:separate;border-spacing:0 4px}
.standings-table th{font-family:'Oswald',sans-serif;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);text-align:left;padding:8px 12px}
.standings-table th.r{text-align:right}
.standings-row{cursor:pointer;transition:all .15s}
.standings-row td{padding:12px;background:var(--surface);border:none}
.standings-row td:first-child{border-radius:8px 0 0 8px}
.standings-row td:last-child{border-radius:0 8px 8px 0}
.standings-row:hover td{background:var(--surface2)}
.standings-row.expanded td{background:var(--surface2);border-radius:8px 8px 0 0!important}
.rank-badge{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;color:#000}
.rank-1{background:linear-gradient(135deg,#ffd700,#ffaa00)}.rank-2{background:linear-gradient(135deg,#c0c0c0,#a0a0a0)}.rank-3{background:linear-gradient(135deg,#cd7f32,#a0622a)}
.rank-other{background:var(--surface3);color:var(--text2)}
.owner-name{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;letter-spacing:0.5px}
.pts{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;text-align:right}
.pts.actual{color:var(--green)}
.pts.projected{color:var(--accent)}
.pts-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:2px;font-family:'Oswald',sans-serif}
.progress-bar{height:4px;background:var(--surface3);border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .5s ease}
.player-panel{display:none;background:var(--surface2);border-radius:0 0 8px 8px;margin-top:-4px;margin-bottom:4px;overflow:hidden}
.player-panel.open{display:block}
.player-row{display:grid;grid-template-columns:1fr 100px 60px 70px 55px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--surface3);gap:0;font-size:14px}
.player-row:last-child{border-bottom:none}
.player-info{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.player-team-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.5px}
.player-name{font-weight:600}
.player-ppg{color:var(--text3);font-size:12px}
.player-status{font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
.player-status.live{background:rgba(255,68,68,0.15);color:var(--live-pulse);animation:pulse-text 1.5s infinite}
.player-status.eliminated{background:rgba(231,76,60,0.15);color:var(--red)}
.player-status.active{background:rgba(46,204,113,0.15);color:var(--green)}
.player-status.upcoming{background:rgba(52,152,219,0.15);color:var(--blue)}
@keyframes pulse-text{0%,100%{opacity:1}50%{opacity:0.6}}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(255,68,68,0.7)}50%{opacity:0.8;box-shadow:0 0 0 6px rgba(255,68,68,0)}}
.player-pts,.player-proj,.player-exp{font-family:'JetBrains Mono',monospace;text-align:right;min-width:50px}
.player-proj{color:var(--accent2);font-size:13px}
.player-exp{color:var(--text3);font-size:12px}
.admin-panel{background:var(--surface);border-radius:10px;padding:20px;margin-bottom:16px;border:1px solid var(--surface3)}
.admin-title{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;color:var(--accent);display:flex;align-items:center;justify-content:space-between}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:8px}
.admin-row{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--surface2);border-radius:6px;font-size:12px;flex-wrap:wrap}
.admin-row label{font-size:10px;color:var(--text3);min-width:28px}
.admin-row input,.admin-row select{font-family:'Source Sans 3',sans-serif;font-size:12px;padding:4px 8px;border-radius:4px;border:1px solid var(--surface3);background:var(--surface);color:var(--text);outline:none}
.admin-row input:focus,.admin-row select:focus{border-color:var(--accent)}
.admin-row input[type=number]{width:50px;text-align:center;font-family:'JetBrains Mono',monospace}
.admin-row input[type=text]{width:80px;text-align:center;font-family:'JetBrains Mono',monospace}
.team-name-admin{font-weight:600;min-width:120px;font-size:12px}
.help-text{font-size:11px;color:var(--text3);margin-bottom:12px;line-height:1.6}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.game-card{background:var(--surface);border-radius:10px;padding:14px;border:1px solid var(--surface3);font-size:13px}
.game-card.live{border-color:var(--live-pulse);box-shadow:0 0 15px rgba(255,68,68,0.08)}
.game-card.elim{opacity:0.5}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px}
.badge.live-b{background:var(--live-pulse);color:#fff}
.badge.final-b{background:var(--surface3);color:var(--text2)}
.badge.active-b{background:var(--green2);color:#fff}
.badge.upcoming-b{background:var(--blue);color:#fff}
.exp-games-display{font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:12px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--green2);color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:768px){
  .header-inner{flex-direction:column;align-items:flex-start}
  .title{font-size:22px}
  .player-row{grid-template-columns:1fr 80px 45px 55px;font-size:12px}
  .player-exp{display:none}

  .container{padding:12px}

.footer{text-align:center;padding:24px;font-size:11px;color:var(--text3);border-top:1px solid var(--surface3);margin-top:40px}

// === STATE ===
let state = loadState();
function defaultState(){
  const teams={};for(const t of Object.keys(BASE_PROBS))teams[t]={status:"active",gamesPlayed:0,liveGame:null};
  const players={};for(const p of PLAYERS_DEFAULT)players[p.name]={completedPts:[],livePts:0};
  return{version:2,teams,players,probOverrides:{},playerSwaps:{},lastUpdated:null};
}
function loadState(){try{const s=localStorage.getItem("mm2026_v2");if(s){const p=JSON.parse(s);if(p.version===2)return ensure(p);}}catch(e){}return defaultState();}
function ensure(s){
  for(const t of Object.keys(BASE_PROBS))if(!s.teams[t])s.teams[t]={status:"active",gamesPlayed:0,liveGame:null};
  for(const p of PLAYERS_DEFAULT)if(!s.players[p.name])s.players[p.name]={completedPts:[],livePts:0};
  if(!s.probOverrides)s.probOverrides={};if(!s.playerSwaps)s.playerSwaps={};if(!s._finalizedGameIds)s._finalizedGameIds=[];return s;
}
function saveState(){state.lastUpdated=new Date().toISOString();localStorage.setItem("mm2026_v2",JSON.stringify(state));}

// === PLAYERS WITH SWAPS ===
function getPlayers(){
  return PLAYERS_DEFAULT.map(p=>{
    const sw=state.playerSwaps[p.name];
    if(sw)return{...p,name:sw.newName,team:sw.newTeam,ppg:sw.newPpg,origName:p.name,swapped:true};
    return{...p,origName:p.name,swapped:false};
  });
}

// === PROBABILITY ENGINE ===
function getProbs(team){
  const base=BASE_PROBS[team];if(!base)return[0,0,0,0,0,0,0];
  const ov=state.probOverrides[team];
  if(ov)return ov.map((v,i)=>v!=null?v:base[i]);
  return[...base];
}
function condWin(probs,r){if(r>=6||probs[r]<0.0001)return 0;return probs[r+1]/probs[r];}
function ml2prob(ml){if(ml==null||ml===0||isNaN(ml))return null;return ml<0?Math.abs(ml)/(Math.abs(ml)+100):100/(ml+100);}

function marginWinP(margin,minRem){
  if(minRem<=0)return margin>0?1:(margin<0?0:0.5);
  const z=margin/(11*Math.sqrt(minRem/40));
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sign=z<0?-1:1;const az=Math.abs(z)/Math.sqrt(2);const t=1/(1+p*az);
  const y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-az*az);
  return 0.5*(1+sign*y);
}

function getLiveWinP(lg){
  if(!lg)return null;
  if(lg.moneyline!=null&&lg.moneyline!==0){const p=ml2prob(lg.moneyline);if(p!=null)return p;}
  const margin=(lg.teamScore||0)-(lg.oppScore||0);
  return marginWinP(margin,lg.minutesRemaining!=null?lg.minutesRemaining:20);
}

function calcExpGamesRemaining(team){
  // Returns expected REMAINING games for this team from their current state forward
  const ts=state.teams[team];if(!ts||ts.status==="eliminated")return 0;
  const probs=getProbs(team);const gp=ts.gamesPlayed||0;
  if(ts.liveGame){
    const winP=getLiveWinP(ts.liveGame);
    const minRem=ts.liveGame.minutesRemaining!=null?ts.liveGame.minutesRemaining:20;
    // Fraction of current game remaining (counts as partial game)
    const currentGameFrac=minRem/40;
    // Expected FULL games after this one, conditional on winning
    let future=0,rp=winP;
    for(let r=gp+1;r<6;r++){future+=rp;rp*=condWin(probs,r);}
    return currentGameFrac+future;
  }
  // Active, not playing: expected games from next game onward
  let exp=0,rp=1;
  for(let r=gp;r<6;r++){exp+=rp;rp*=condWin(probs,r);}
  return exp;
}

function computeLiveRoundProbs(team){
  // Returns array of 7 probabilities [R64, R32, S16, E8, F4, CG, WIN]
  // reflecting the CURRENT state (games won, live game, future conditional)
  const ts=state.teams[team];
  const base=getProbs(team);
  if(!ts||ts.status==="eliminated")return[0,0,0,0,0,0,0];
  const gp=ts.gamesPlayed||0;
  const result=new Array(7).fill(0);

  // Rounds already won: probability = 1.0
  for(let r=0;r<=gp;r++)result[r]=1.0;

  if(ts.liveGame){
    // Currently in round gp (0-indexed): P(advance past this round) = liveWinP
    const winP=getLiveWinP(ts.liveGame);
    let runP=winP;
    for(let r=gp+1;r<7;r++){
      result[r]=runP;
      runP*=condWin(base,r);
    }
  } else {
    // Not playing: next game is round gp
    let runP=1.0;
    for(let r=gp;r<7;r++){
      // For the first future round (r=gp), they need to WIN it, not just reach it
      // result[r] is P(reach round r), and they've already reached round gp
      if(r===gp){result[r]=1.0;runP=condWin(base,r);}
      else{result[r]=runP;runP*=condWin(base,r);}
    }
  }
  return result;
}

// === PROJECTION ===
// Core formula: projected = actual_pts + ppg × expected_games_remaining
function projectPlayer(p){
  const ts=state.teams[p.team];
  const ps=state.players[p.origName||p.name]||{completedPts:[],livePts:0};
  const actual=(ps.completedPts||[]).reduce((a,b)=>a+b,0)+(ps.livePts||0);
  if(!ts||ts.status==="eliminated")return{actual,projected:actual,expGamesRem:0,status:"eliminated"};
  const expGamesRem=calcExpGamesRemaining(p.team);
  const projected=actual+p.ppg*expGamesRem;
  // Determine status
  if(ts.liveGame){
    const winP=getLiveWinP(ts.liveGame);
    const minRem=ts.liveGame.minutesRemaining!=null?ts.liveGame.minutesRemaining:20;
    return{actual,projected,expGamesRem,status:"live",winP,minRem};
  }
  const gp=ts.gamesPlayed||0;
  return{actual,projected,expGamesRem,status:gp>0?"active":"upcoming"};
}

function calcStandings(){
  const players=getPlayers();
  const standings=OWNERS.map(owner=>{
    const op=players.filter(p=>p.owner===owner);
    let tA=0,tP=0;
    const details=op.map(p=>{const proj=projectPlayer(p);tA+=proj.actual;tP+=proj.projected;return{...p,...proj};});
    details.sort((a,b)=>b.projected-a.projected);
    return{owner,totalActual:tA,totalProjected:tP,players:details};
  });
  standings.sort((a,b)=>b.totalProjected-a.totalProjected);
  return standings;
}

// === SHARED STATE ===
async function fetchSharedState(){
  try{
    document.getElementById("syncStatus").textContent="Syncing...";
    const r=await fetch(RAW_URL+"?t="+Date.now(),{signal:AbortSignal.timeout(5000)});
    if(!r.ok)throw new Error("none");
    const remote=await r.json();
    if(remote.version===2&&remote.lastUpdated){
      const rt=new Date(remote.lastUpdated).getTime();
      const lt=state.lastUpdated?new Date(state.lastUpdated).getTime():0;
      if(rt>lt){state=ensure(remote);saveState();render();showToast("Synced with latest data");}
      else showToast("Already up to date");
    }
    document.getElementById("syncStatus").textContent="Synced "+new Date().toLocaleTimeString();
  }catch(e){document.getElementById("syncStatus").textContent="Local mode";}
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download=STATE_FILE;a.click();URL.revokeObjectURL(url);
  showToast("Exported! Upload state.json to GitHub to share");
}

function importJSON(){
  const input=document.createElement("input");input.type="file";input.accept=".json";
  input.onchange=async()=>{
    try{const t=await input.files[0].text();const imp=JSON.parse(t);
    if(imp.version===2){state=ensure(imp);saveState();render();if(currentTab==="admin")renderAdmin();showToast("Imported!");}
    }catch(e){showToast("Invalid file");}
  };input.click();
}

function renderGames(){
  const regions=["East","West","South","Midwest"];const players=getPlayers();let h="";
  for(const region of regions){

    h+=`<h3 style="font-family:'Oswald',sans-serif;font-size:16px;text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin:20px 0 12px">${region} Region</h3><div class="games-grid">`;
    for(const[name,meta]of rt){
      const ts=state.teams[name];if(!ts)continue;
      const hasDrafted=players.some(p=>p.team===name);
      const gp=ts.gamesPlayed||0;const expRem=calcExpGamesRemaining(name);
      const liveProbs=computeLiveRoundProbs(name);
      const color=TEAM_COLORS[name]||"#555";const isElim=ts.status==="eliminated";const isLive=!!ts.liveGame;
      let badge="";
      if(isLive)badge=`<span class="badge live-b">LIVE</span>`;
      else if(isElim)badge=`<span class="badge final-b">OUT</span>`;
      else if(gp>0)badge=`<span class="badge active-b">${gp}W</span>`;
      else badge=`<span class="badge upcoming-b">—</span>`;
      h+=`<div class="game-card${isLive?' live':''}${isElim?' elim':''}" ${hasDrafted?`style="border-left:3px solid ${color}"`:""}>
        <div style="display:flex;justify-content:space-between;align-items:center"><span style="color:${color};font-weight:700;font-family:'Oswald',sans-serif;font-size:13px">(${meta.seed}) ${name}</span>${badge}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px"><span style="font-size:11px;color:var(--text3)">Games won: ${gp}</span><span class="exp-games-display">Exp remaining: <strong>${expRem.toFixed(2)}</strong></span></div>
        <div style="margin-top:6px;display:flex;gap:3px;font-family:'JetBrains Mono',monospace;font-size:9px">
          ${["R32","S16","E8","F4","CG","W"].map((rn,i)=>{
            const p=liveProbs[i+1];const pct=(p*100).toFixed(0);
            const bg=p>=1?'var(--green2)':p>0.5?'rgba(46,204,113,0.2)':p>0?'rgba(255,107,53,0.15)':'var(--surface3)';
            const col=p>=1?'#fff':p>0?'var(--text)':'var(--text3)';
            return`<span style="flex:1;text-align:center;padding:2px;border-radius:3px;background:${bg};color:${col}">${rn}<br>${pct}%</span>`;
          }).join("")}
        </div>`;
      if(isLive){
        const lg=ts.liveGame;const winP=getLiveWinP(lg);const minRem=lg.minutesRemaining!=null?lg.minutesRemaining:20;
        h+=`<div style="margin-top:8px;padding:8px;background:var(--surface2);border-radius:6px;font-size:12px">
          <div style="display:flex;justify-content:space-between"><span>vs ${lg.opponent||"TBD"}</span><strong>${lg.teamScore||0} - ${lg.oppScore||0}</strong></div>
          <div style="display:flex;justify-content:space-between;color:var(--text3);margin-top:4px"><span>${minRem.toFixed(1)}m left</span><span>Win: <strong style="color:${winP>.5?'var(--green)':'var(--red)'}">${(winP*100).toFixed(1)}%</strong>${lg.moneyline?' (ML: '+lg.moneyline+')':''}</span></div></div>`;
      }
      if(hasDrafted){
        h+=`<div style="margin-top:6px;font-size:11px;color:var(--text3)">${players.filter(p=>p.team===name).map(p=>`${p.name.split(' ').pop()} (${p.owner})`).join(" · ")}</div>`;
      }
      h+=`</div>`;
    }
    h+=`</div>`;
  }
  document.getElementById('games-panel').innerHTML=h;
}

function resolveESPNTeam(displayName, abbrev) {
  if (ESPN_TEAM_MAP[displayName]) return ESPN_TEAM_MAP[displayName];
  // Try abbreviation first (more precise than fuzzy)
  const abbrMap = {"DUKE":"Duke","MICH":"Michigan","ARIZ":"Arizona","FLA":"Florida","ARK":"Arkansas",
    "HOU":"Houston","ILL":"Illinois","GONZ":"Gonzaga","ISU":"Iowa State","BAMA":"Alabama",
    "PUR":"Purdue","VAN":"Vanderbilt","MSU":"Michigan State","KU":"Kansas","KAN":"Kansas",
    "CONN":"Connecticut","SJU":"St. John's","NEB":"Nebraska","UVA":"Virginia","WIS":"Wisconsin",
    "TENN":"Tennessee","TTU":"Texas Tech","BYU":"BYU","LOU":"Louisville","OSU":"Ohio State",
    "UCLA":"UCLA","UNC":"North Carolina","AKR":"Akron","UK":"Kentucky","TCU":"TCU",
    "OHST":"Ohio State","USF":"South Florida","UNI":"Northern Iowa",
    "IOWA":"Iowa","CLEM":"Clemson"};
  if (abbrMap[abbrev]) return abbrMap[abbrev];
  // Fuzzy: find the LONGEST matching team name to prevent "Michigan" matching before "Michigan State"
  if (!displayName) return null;
  const dn = displayName.toLowerCase();
  let bestMatch = null, bestLen = 0;
  for (const key of Object.keys(BASE_PROBS)) {
    if (dn.includes(key.toLowerCase()) && key.length > bestLen) {
      bestMatch = key; bestLen = key.length;
    }
  }
  if (bestMatch) console.log(`[MM Pool] Fuzzy team resolve: "${displayName}" → "${bestMatch}"`);
  return bestMatch;
}

function matchPlayer(espnName, teamName) {
  // Find our players on this team
  const teamPlayers = PLAYERS_DEFAULT.filter(p => {
    const sw = state.playerSwaps[p.name];
    return sw ? sw.newTeam === teamName : p.team === teamName;
  });
  if (teamPlayers.length === 0) return null;

  // Check swapped names too
  const getActiveName = (p) => {
    const sw = state.playerSwaps[p.name];
    return sw ? sw.newName : p.name;
  };

  // Direct match
  for (const p of teamPlayers) {
    if (getActiveName(p) === espnName) return p.name; // return original name (state key)
  }

  // Last name match
  const espnLast = espnName.split(" ").pop().toLowerCase();
  const lastMatches = teamPlayers.filter(p => {
    const activeName = getActiveName(p);
    return activeName.split(" ").pop().toLowerCase() === espnLast;
  });
  if (lastMatches.length === 1) return lastMatches[0].name;

  // Partial match (for names with Jr., III, etc.)
  for (const p of teamPlayers) {
    const activeName = getActiveName(p).toLowerCase();
    const espnLower = espnName.toLowerCase();
    // Check if last names match ignoring suffixes
    const ourParts = activeName.replace(/\s+(jr\.?|sr\.?|ii|iii|iv)$/i, "").split(" ");
    const espnParts = espnLower.replace(/\s+(jr\.?|sr\.?|ii|iii|iv)$/i, "").split(" ");
    const ourLast = ourParts[ourParts.length - 1];
    const espnLastClean = espnParts[espnParts.length - 1];
    if (ourLast === espnLastClean && ourLast.length > 3) return p.name;
  }

  return null;
}

function getMinutesRemaining(status) {
  const type = status.type || "";
  if (type === "STATUS_FINAL" || status.completed) return 0;
  if (type === "STATUS_SCHEDULED" || type === "STATUS_POSTPONED" || type === "") return 40;
  if (type === "STATUS_HALFTIME") return 20; // Explicitly handle halftime
  const period = status.period || 1;
  const clock = status.clock || "20:00";
  const parts = clock.split(":");
  const mins = parseInt(parts[0]) || 0;
  const secs = parseInt(parts[1]) || 0;
  const clockMins = mins + secs / 60;
  if (type === "STATUS_END_PERIOD") {
    // End of a period: clock is 0, next period hasn't started
    if (period === 1) return 20; // End of 1st half = 20 min left
    return 0; // End of 2nd half or OT
  }
  if (period === 1) return clockMins + 20;
  if (period === 2) return clockMins;
  return clockMins; // OT
}

let espnAutoInterval = null;
let lastESPNFetch = null;

async function fetchESPNScores() {
  try {
    const today = new Date();
    const yesterday = new Date(today.getTime() - 24*60*60*1000);
    const fmt = d => d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
    const todayStr = fmt(today);
    const yesterdayStr = fmt(yesterday);

    // Fetch both today and yesterday to catch late-finishing games
    const allGames = [];
    for (const dateStr of [todayStr, yesterdayStr]) {
      try {
        const resp = await fetch(`${WORKER_URL}/scoreboard?date=${dateStr}`, {
          signal: AbortSignal.timeout(8000)
        });
        if (resp.ok) {
          const data = await resp.json();
          if (data.games) {
            console.log(`[MM Pool] Scoreboard ${dateStr}: ${data.games.length} games`);
            allGames.push(...data.games);
          }
        }
      } catch(e) { console.warn(`[MM Pool] Scoreboard ${dateStr} failed:`, e.message); }
    }

    if (allGames.length === 0) throw new Error("No games from either day");

    // Deduplicate by game id (same game might appear in both days' feeds)
    const seen = new Set();
    const games = allGames.filter(g => { if (seen.has(g.id)) return false; seen.add(g.id); return true; });

    let hasLive = false;
    const liveGameIds = [];
    const finalGameIds = [];
    const finalizedTeams = new Set();
    const teamsSeenInGames = new Set(); // Track which teams appear in any game

    // Track which games we've already finalized to avoid double-counting
    if (!state._finalizedGameIds) state._finalizedGameIds = [];

    for (const game of games) {
      const homeName = resolveESPNTeam(game.home.name, game.home.abbrev);
      const awayName = resolveESPNTeam(game.away.name, game.away.abbrev);
      if (homeName) teamsSeenInGames.add(homeName);
      if (awayName) teamsSeenInGames.add(awayName);
      const statusType = game.status.type || "";
      const isFinal = statusType === "STATUS_FINAL" || game.status.completed;
      const isScheduled = statusType === "STATUS_SCHEDULED" || statusType === "STATUS_POSTPONED" || statusType === "";
      const isLive = !isFinal && !isScheduled; // Halftime, end of period, delays, etc. are all "live"
      const minRem = getMinutesRemaining(game.status);
      if (isLive) console.log(`[MM Pool] Live game: ${game.home.name} vs ${game.away.name} (status: ${statusType}, ${minRem.toFixed(1)}m rem)`);

      const hasOurTeam = (name) => name && state.teams[name] &&
        PLAYERS_DEFAULT.some(p => {
          const sw = state.playerSwaps[p.name];
          return (sw ? sw.newTeam : p.team) === name;
        });

      for (const [teamName, isHome] of [[homeName, true], [awayName, false]]) {
        if (!teamName || !state.teams[teamName]) continue;
        const ts = state.teams[teamName];

        const teamScore = isHome ? game.home.score : game.away.score;
        const oppScore = isHome ? game.away.score : game.home.score;
        const oppName = isHome ? (awayName || game.away.name) : (homeName || game.home.name);

        if (isLive) {
          if (ts.status === "eliminated") continue;
          hasLive = true;
          let winP = null;
          if (game.winProb != null) {
            winP = isHome ? game.winProb : 1 - game.winProb;
          }

          const existingLG = ts.liveGame;
          const hasManualML = existingLG && existingLG.moneyline != null && existingLG.moneyline !== 0;

          ts.liveGame = {
            teamScore, oppScore,
            minutesRemaining: minRem,
            moneyline: hasManualML ? existingLG.moneyline : null,
            opponent: oppName,
            espnWinProb: winP,
          };

          if (hasOurTeam(teamName)) liveGameIds.push(game.id);

        } else if (isFinal) {
          // ALWAYS clear liveGame when we see a final — even if already finalized
          if (ts.liveGame) {
            console.log(`[MM Pool] Clearing liveGame for ${teamName} (game final)`);
            ts.liveGame = null;
          }

          const alreadyFinalized = state._finalizedGameIds.includes(game.id + "_" + teamName);

          if (!alreadyFinalized) {
            const won = teamScore > oppScore;

            if (ts.status !== "eliminated") {
              if (won) {
                ts.gamesPlayed = (ts.gamesPlayed || 0) + 1;
              } else {
                ts.status = "eliminated";
              }
            }

            state._finalizedGameIds.push(game.id + "_" + teamName);

            if (hasOurTeam(teamName)) {
              finalizedTeams.add(teamName);
              finalGameIds.push(game.id);
            }
          }
        }
      }
    }

    // SAVE scoreboard-level updates immediately (team scores, statuses, win probs)
    // This ensures team-level data persists even if box score fetches fail
    saveState();
    render();

    // Fetch box scores: LIVE GAMES FIRST (priority), then finals
    const liveUnique = [...new Set(liveGameIds)];
    const finalUnique = [...new Set(finalGameIds)];
    console.log(`[MM Pool] Live games: ${liveUnique.length}, Final games: ${finalUnique.length}`);

    // Helper: fetch one box score and update player points
    async function fetchAndApplyBoxScore(gameId, isFinalGame) {
      try {
        const bResp = await fetch(`${WORKER_URL}/boxscore?gameId=${gameId}`, {
          signal: AbortSignal.timeout(10000)
        });
        if (!bResp.ok) {
          console.warn(`[MM Pool] Box score ${gameId} returned ${bResp.status}`);
          return;
        }
        const bData = await bResp.json();

        for (const ps of (bData.players || [])) {
          const teamName = resolveESPNTeam(ps.team, ps.abbrev);
          if (!teamName) continue;
          const ourPlayerKey = matchPlayer(ps.name, teamName);
          if (!ourPlayerKey || !state.players[ourPlayerKey]) continue;

          const playerState = state.players[ourPlayerKey];

          if (isFinalGame && finalizedTeams.has(teamName)) {
            // Game is FINAL: move points to completedPts, clear livePts
            if (!Array.isArray(playerState.completedPts)) playerState.completedPts = [];
            // Guard: only push if player doesn't already have points for this round
            const teamGP = state.teams[teamName]?.gamesPlayed || 0;
            if (playerState.completedPts.length < teamGP) {
              playerState.completedPts.push(ps.pts);
              console.log(`[MM Pool] Final: ${ps.name} → ${ps.pts}pts → completedPts`);
            } else {
              console.log(`[MM Pool] Final: ${ps.name} already has ${playerState.completedPts.length} entries (gp=${teamGP}), skipping push`);
            }
            playerState.livePts = 0;
          } else if (!isFinalGame) {
            // Game is LIVE: update livePts
            playerState.livePts = ps.pts;
          }
        }
      } catch (e) {
        console.warn(`[MM Pool] Box score ${gameId} failed:`, e.message);
      }
    }

    // Fetch live box scores first (these are time-sensitive)
    for (const gid of liveUnique) {
      await fetchAndApplyBoxScore(gid, false);
    }

    // Then fetch final box scores (one-time operation)
    for (const gid of finalUnique) {
      await fetchAndApplyBoxScore(gid, true);
    }

    // CLEANUP: Clear stale liveGame for teams that aren't in ANY scoreboard response
    // This handles the case where a game finished but the scoreboard date rolled over
    for (const [teamName, ts] of Object.entries(state.teams)) {
      if (ts.liveGame && !teamsSeenInGames.has(teamName)) {
        console.log(`[MM Pool] Clearing stale liveGame for ${teamName} (not in any scoreboard)`);
        ts.liveGame = null;
      }
    }

    // CLEANUP: Clear stale livePts for ALL players on finalized/eliminated teams
    // This catches cases where a player had livePts from a previous cycle but
    // wasn't matched in the box score (name mismatch, timeout, etc.)
    for (const p of PLAYERS_DEFAULT) {
      const sw = state.playerSwaps[p.name];
      const teamName = sw ? sw.newTeam : p.team;
      const ts = state.teams[teamName];
      const ps = state.players[p.name];
      if (ps && ts && (ts.status === "eliminated" || (!ts.liveGame && ps.livePts > 0))) {
        // Team is not in a live game but player has livePts — stale data
        if (!ts.liveGame && ps.livePts > 0) {
          console.log(`[MM Pool] Clearing stale livePts for ${p.name}: ${ps.livePts} → 0`);
          ps.livePts = 0;
        }
      }
    }

    // Trim _finalizedGameIds to prevent unbounded growth
    if (state._finalizedGameIds.length > 200) {
      state._finalizedGameIds = state._finalizedGameIds.slice(-100);
    }

    lastESPNFetch = new Date();
    saveState();
    render();
    updateLiveIndicator(hasLive, true);
    return true;

  } catch (e) {
    console.warn("ESPN fetch failed:", e.message);
    updateLiveIndicator(false, false);
    return false;
  }
}

function updateLiveIndicator(hasLive, connected) {
  const el = document.getElementById("liveIndicator");
  if (!el) return;
  if (hasLive && connected) {
    el.innerHTML = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--live-pulse);animation:pulse 1.5s infinite;margin-right:4px"></span>LIVE`;
    el.style.color = "var(--live-pulse)";
  } else if (connected) {
    el.innerHTML = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:4px"></span>Connected`;
    el.style.color = "var(--green)";
  } else {
    el.innerHTML = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--text3);margin-right:4px"></span>Manual`;
    el.style.color = "var(--text3)";
  }
  if (lastESPNFetch) {
    el.title = "Last fetch: " + lastESPNFetch.toLocaleTimeString();
  }
}

function startAutoFetch() {
  // Check worker health first
  fetch(`${WORKER_URL}/health`, { signal: AbortSignal.timeout(5000) })
    .then(r => r.json())
    .then(d => {
      if (d.status === "ok") {
        updateLiveIndicator(false, true);
        // Initial fetch
        fetchESPNScores();
        // Auto-refresh every 45 seconds
        espnAutoInterval = setInterval(fetchESPNScores, 45000);
      } else {
        updateLiveIndicator(false, false);
      }
    })
    .catch(() => {
      updateLiveIndicator(false, false);
    });
}

// Also update getLiveWinP to use ESPN win prob as fallback
const _origGetLiveWinP = getLiveWinP;
getLiveWinP = function(lg) {
  if (!lg) return null;
  // Priority: manual moneyline > ESPN win prob > score-based model
  if (lg.moneyline != null && lg.moneyline !== 0) {
    const p = ml2prob(lg.moneyline);
    if (p != null) return p;
  }
  if (lg.espnWinProb != null) return lg.espnWinProb;
  const margin = (lg.teamScore || 0) - (lg.oppScore || 0);
  return marginWinP(margin, lg.minutesRemaining != null ? lg.minutesRemaining : 20);
};

// Start auto-fetch after a short delay
setTimeout(startAutoFetch, 2000);
</script>
