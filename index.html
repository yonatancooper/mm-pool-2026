<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 March Madness Pool</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;--surface:#131a2b;--surface2:#1a2340;--surface3:#222d4a;
  --text:#e8ecf4;--text2:#8892a8;--text3:#5a6480;
  --accent:#ff6b35;--accent2:#ff8f65;--green:#2ecc71;--green2:#27ae60;
  --red:#e74c3c;--red2:#c0392b;--yellow:#f1c40f;--blue:#3498db;
  --gold:#ffd700;--silver:#c0c0c0;--bronze:#cd7f32;
  --live-pulse:#ff4444;
  --rank1:linear-gradient(135deg,#ffd700 0%,#ffaa00 100%);
  --rank2:linear-gradient(135deg,#c0c0c0 0%,#a0a0a0 100%);
  --rank3:linear-gradient(135deg,#cd7f32 0%,#a0622a 100%);
}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.header{background:linear-gradient(180deg,#1a2340 0%,#0d1220 100%);border-bottom:3px solid var(--accent);padding:16px 24px;position:sticky;top:0;z-index:100}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.title{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;text-transform:uppercase;letter-spacing:2px;background:linear-gradient(90deg,#ff6b35,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.title span{font-size:14px;font-weight:400;letter-spacing:1px;display:block;-webkit-text-fill-color:var(--text2)}
.status-bar{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--text2)}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.status-dot.live{background:var(--live-pulse);animation:pulse 1.5s infinite}
.status-dot.idle{background:var(--green)}
.status-dot.off{background:var(--text3)}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(255,68,68,0.7)}50%{opacity:0.8;box-shadow:0 0 0 6px rgba(255,68,68,0)}}
.btn{font-family:'Source Sans 3',sans-serif;font-size:12px;font-weight:600;padding:6px 14px;border-radius:6px;border:1px solid var(--surface3);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .2s}
.btn:hover{background:var(--surface3);color:var(--text)}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.container{max-width:1100px;margin:0 auto;padding:20px}
.tabs{display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid var(--surface3);padding-bottom:12px}
.tab{font-family:'Oswald',sans-serif;font-size:15px;font-weight:500;text-transform:uppercase;letter-spacing:1.5px;padding:8px 16px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* Standings */
.standings-table{width:100%;border-collapse:separate;border-spacing:0 4px}
.standings-table th{font-family:'Oswald',sans-serif;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);text-align:left;padding:8px 12px}
.standings-table th.r{text-align:right}
.standings-row{cursor:pointer;transition:all .15s}
.standings-row td{padding:12px;background:var(--surface);border:none}
.standings-row td:first-child{border-radius:8px 0 0 8px}
.standings-row td:last-child{border-radius:0 8px 8px 0}
.standings-row:hover td{background:var(--surface2)}
.standings-row.expanded td{background:var(--surface2);border-radius:8px 8px 0 0!important}
.rank-badge{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;color:#000}
.rank-1{background:var(--rank1)}.rank-2{background:var(--rank2)}.rank-3{background:var(--rank3)}
.rank-other{background:var(--surface3);color:var(--text2)}
.owner-name{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;letter-spacing:0.5px}
.pts{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;text-align:right}
.pts.actual{color:var(--green)}
.pts.projected{color:var(--accent)}
.pts-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:2px;font-family:'Oswald',sans-serif}
.progress-bar{height:4px;background:var(--surface3);border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .5s ease}
/* Player detail panel */
.player-panel{display:none;background:var(--surface2);border-radius:0 0 8px 8px;margin-top:-4px;margin-bottom:4px;overflow:hidden}
.player-panel.open{display:block}
.player-row{display:grid;grid-template-columns:1fr auto auto auto;align-items:center;padding:10px 16px;border-bottom:1px solid var(--surface3);gap:12px;font-size:14px}
.player-row:last-child{border-bottom:none}
.player-info{display:flex;align-items:center;gap:10px}
.player-team-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.5px}
.player-name{font-weight:600}
.player-ppg{color:var(--text3);font-size:12px}
.player-status{font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
.player-status.live{background:rgba(255,68,68,0.15);color:var(--live-pulse);animation:pulse-text 1.5s infinite}
.player-status.won{background:rgba(46,204,113,0.15);color:var(--green)}
.player-status.eliminated{background:rgba(231,76,60,0.15);color:var(--red)}
.player-status.upcoming{background:rgba(52,152,219,0.15);color:var(--blue)}
@keyframes pulse-text{0%,100%{opacity:1}50%{opacity:0.6}}
.player-pts{font-family:'JetBrains Mono',monospace;font-weight:600;text-align:right;min-width:50px}
.player-proj{font-family:'JetBrains Mono',monospace;color:var(--accent2);text-align:right;min-width:70px;font-size:13px}
/* Games panel */
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.game-card{background:var(--surface);border-radius:10px;padding:16px;border:1px solid var(--surface3)}
.game-card.live{border-color:var(--live-pulse);box-shadow:0 0 20px rgba(255,68,68,0.1)}
.game-card.final{opacity:0.8}
.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:11px;color:var(--text3);font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px}
.game-status-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px}
.game-status-badge.live{background:var(--live-pulse);color:#fff}
.game-status-badge.final{background:var(--surface3);color:var(--text2)}
.game-status-badge.upcoming{background:var(--blue);color:#fff}
.game-team{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.game-team-info{display:flex;align-items:center;gap:8px}
.game-seed{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text3);min-width:20px}
.game-team-name{font-weight:600;font-size:15px}
.game-team-name.winner{color:var(--green)}
.game-team-name.loser{color:var(--text3);text-decoration:line-through}
.game-score{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
.game-win-prob{font-size:11px;color:var(--text3);text-align:center;margin-top:8px;font-family:'JetBrains Mono',monospace}
/* Admin panel */
.admin-panel{background:var(--surface);border-radius:10px;padding:20px;margin-bottom:20px;border:1px solid var(--surface3)}
.admin-title{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;color:var(--accent)}
.admin-section{margin-bottom:16px}
.admin-section h4{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-family:'Oswald',sans-serif}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.admin-team-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface2);border-radius:6px;font-size:13px}
.admin-team-row select,.admin-team-row input{font-family:'Source Sans 3',sans-serif;font-size:12px;padding:4px 8px;border-radius:4px;border:1px solid var(--surface3);background:var(--surface);color:var(--text);outline:none}
.admin-team-row input{width:60px;text-align:center}
.admin-team-row select{min-width:100px}
.admin-player-score{display:flex;align-items:center;gap:6px;padding:4px 8px;background:var(--surface2);border-radius:6px;font-size:12px}
.admin-player-score input{width:45px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:12px;padding:3px 4px;border-radius:3px;border:1px solid var(--surface3);background:var(--surface);color:var(--text)}
.admin-save{margin-top:12px}
/* Responsive */
@media(max-width:768px){
  .header-inner{flex-direction:column;align-items:flex-start}
  .title{font-size:22px}
  .standings-table{font-size:13px}
  .player-row{grid-template-columns:1fr auto auto;font-size:12px}
  .player-proj{display:none}
  .games-grid{grid-template-columns:1fr}
  .container{padding:12px}
}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state h2{font-family:'Oswald',sans-serif;font-size:24px;margin-bottom:8px;color:var(--text2)}
.loading{text-align:center;padding:40px;color:var(--text3)}
.ticker{background:var(--surface2);padding:8px 0;overflow:hidden;white-space:nowrap;font-size:12px;color:var(--text2);border-bottom:1px solid var(--surface3)}
.ticker-inner{display:inline-block;animation:scroll 30s linear infinite}
.ticker-item{display:inline;padding:0 24px}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.footer{text-align:center;padding:24px;font-size:11px;color:var(--text3);border-top:1px solid var(--surface3);margin-top:40px}
</style>
</head>

function defaultState() {
  const teamState = {};
  for (const t of Object.keys(TEAMS)) {
    teamState[t] = {status:"active", gamesPlayed:0, currentGame:null};
  }
  const playerScores = {};
  for (const p of PLAYERS) {
    playerScores[p.name] = {completedGamePts:[], currentGamePts:0};
  }
  return {teams:teamState, players:playerScores, lastESPNUpdate:null, round:"R64"};
}

function loadState() {
  try {
    const s = localStorage.getItem(STATE_KEY);
    if (s) {
      const parsed = JSON.parse(s);
      // Ensure all players/teams exist
      for (const p of PLAYERS) {
        if (!parsed.players[p.name]) parsed.players[p.name] = {completedGamePts:[],currentGamePts:0};
      }
      for (const t of Object.keys(TEAMS)) {
        if (!parsed.teams[t]) parsed.teams[t] = {status:"active",gamesPlayed:0,currentGame:null};
      }
      return parsed;
    }
  } catch(e) {}
  return defaultState();
}

// ============================================================
// PROJECTION ENGINE
// ============================================================
function calcExpectedGames(teamName) {
  // Pre-tournament expected games from Silver Bulletin
  const t = TEAMS[teamName];
  if (!t) return 1;
  return t.r64 + t.r32 + t.s16 + t.e8 + t.f4 + t.cp;
}

function getReachProbs(teamName) {
  const t = TEAMS[teamName];
  if (!t) return [1,0,0,0,0,0,0];
  return [t.r64, t.r32, t.s16, t.e8, t.f4, t.cp, t.win];
}

function calcLiveWinProb(margin, minutesRemaining) {
  // Normal CDF approximation for win probability
  // Based on: P(win) = Φ(margin / (σ × √(t/40)))
  // σ ≈ 11 (std dev of final margin in NCAA)
  if (minutesRemaining <= 0) return margin > 0 ? 1 : (margin < 0 ? 0 : 0.5);
  const z = margin / (11 * Math.sqrt(minutesRemaining / 40));
  return normalCDF(z);
}

function normalCDF(z) {
  const a1=0.254829592, a2=-0.284496736, a3=1.421413741, a4=-1.453152027, a5=1.061405429, p=0.3275911;
  const sign = z < 0 ? -1 : 1;
  z = Math.abs(z) / Math.sqrt(2);
  const t = 1.0 / (1.0 + p * z);
  const y = 1.0 - (((((a5*t + a4)*t) + a3)*t + a2)*t + a1)*t * Math.exp(-z*z);
  return 0.5 * (1.0 + sign * y);
}

function projectPlayer(player) {
  const ts = state.teams[player.team];
  const ps = state.players[player.name];
  if (!ts || !ps) return {actual:0, projected:player.ppg * calcExpectedGames(player.team), status:"upcoming"};

  const actualPts = (ps.completedGamePts || []).reduce((a,b)=>a+b, 0) + (ps.currentGamePts || 0);

  if (ts.status === "eliminated") {
    return {actual:actualPts, projected:actualPts, status:"eliminated"};
  }

  const reachProbs = getReachProbs(player.team);
  const gamesPlayed = ts.gamesPlayed || 0;

  if (ts.currentGame) {
    // LIVE game
    const cg = ts.currentGame;
    const minRemaining = cg.minutesRemaining || 0;
    const timeRemainingFrac = Math.max(0, minRemaining) / 40;

    // Remaining points in THIS game (player scores regardless of outcome)
    const currentGameRemaining = player.ppg * timeRemainingFrac;

    // Live win probability
    const margin = (cg.teamScore || 0) - (cg.oppScore || 0);
    const liveWinP = cg.winProb != null ? cg.winProb : calcLiveWinProb(margin, minRemaining);

    // Expected future games AFTER current game
    let futureGames = 0;
    let runningProb = liveWinP;
    const currentRoundIdx = gamesPlayed; // 0=R64, 1=R32, etc.

    for (let i = currentRoundIdx + 1; i < 6; i++) {
      futureGames += runningProb;
      if (reachProbs[i] > 0.0001) {
        const condWin = reachProbs[i + 1] / reachProbs[i];
        runningProb *= condWin;
      } else {
        runningProb *= 0.5; // fallback for extreme underdogs
      }
    }

    return {
      actual: actualPts,
      projected: actualPts + currentGameRemaining + player.ppg * futureGames,
      status: "live",
      liveWinP,
      minRemaining
    };
  }

  // Team is alive but not currently playing
  let expRemainingGames = 0;
  let runningProb = 1.0;

  for (let i = gamesPlayed; i < 6; i++) {
    expRemainingGames += runningProb;
    if (reachProbs[i] > 0.0001) {
      const condWin = reachProbs[i + 1] / reachProbs[i];
      runningProb *= condWin;
    } else {
      runningProb *= 0.5;
    }
  }

  return {
    actual: actualPts,
    projected: actualPts + player.ppg * expRemainingGames,
    status: gamesPlayed > 0 ? "active" : "upcoming"
  };
}

function calcStandings() {
  const standings = OWNERS.map(owner => {
    const players = PLAYERS.filter(p => p.owner === owner);
    let totalActual = 0, totalProjected = 0;
    const playerDetails = players.map(p => {
      const proj = projectPlayer(p);
      totalActual += proj.actual;
      totalProjected += proj.projected;
      return {...p, ...proj};
    });
    playerDetails.sort((a,b) => b.projected - a.projected);
    return {owner, totalActual, totalProjected, players:playerDetails};
  });
  standings.sort((a,b) => b.totalProjected - a.totalProjected);
  return standings;
}

const ESPN_BASE = "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball";
const CORS_PROXIES = [
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];
let currentProxy = 0;

async function fetchWithProxy(url) {
  // Try direct first
  try {
    const r = await fetch(url, {signal:AbortSignal.timeout(5000)});
    if (r.ok) return await r.json();
  } catch(e) {}
  // Try proxies
  for (let i = 0; i < CORS_PROXIES.length; i++) {
    try {
      const proxyUrl = CORS_PROXIES[(currentProxy + i) % CORS_PROXIES.length](url);
      const r = await fetch(proxyUrl, {signal:AbortSignal.timeout(8000)});
      if (r.ok) {
        currentProxy = (currentProxy + i) % CORS_PROXIES.length;
        return await r.json();
      }
    } catch(e) {}
  }
  return null;
}

function resolveTeamName(espnName, abbrev) {
  if (ESPN_NAME_MAP[espnName]) return ESPN_NAME_MAP[espnName];
  if (ESPN_NAME_MAP[abbrev]) return ESPN_NAME_MAP[abbrev];
  // Fuzzy match
  for (const key of Object.keys(TEAMS)) {
    if (espnName.toLowerCase().includes(key.toLowerCase())) return key;
  }
  return null;
}

function getMinutesRemaining(status) {
  if (!status) return 40;
  const type = status.type?.name || status.type?.state || "";
  if (type === "STATUS_FINAL" || type === "STATUS_END_PERIOD" && status.type?.completed) return 0;
  if (type === "STATUS_SCHEDULED" || type === "STATUS_POSTPONED") return 40;
  const period = status.period || 1;
  const clock = status.displayClock || "20:00";
  const parts = clock.split(":");
  const mins = parseInt(parts[0]) || 0;
  const secs = parseInt(parts[1]) || 0;
  const clockMins = mins + secs/60;
  if (period === 1) return clockMins + 20;
  if (period === 2) return clockMins;
  // Overtime
  return clockMins;
}

async function fetchLiveScores() {
  const today = new Date();
  const dateStr = today.getFullYear() +
    String(today.getMonth()+1).padStart(2,'0') +
    String(today.getDate()).padStart(2,'0');

  const url = `${ESPN_BASE}/scoreboard?dates=${dateStr}&groups=100&limit=100`;
  const data = await fetchWithProxy(url);
  if (!data || !data.events) return null;

  const games = [];
  for (const event of data.events) {
    const comp = event.competitions?.[0];
    if (!comp) continue;
    const teams = comp.competitors || [];
    if (teams.length < 2) continue;

    const home = teams.find(t => t.homeAway === "home") || teams[0];
    const away = teams.find(t => t.homeAway === "away") || teams[1];

    const homeName = resolveTeamName(
      home.team?.displayName || home.team?.name || "",
      home.team?.abbreviation || ""
    );
    const awayName = resolveTeamName(
      away.team?.displayName || away.team?.name || "",
      away.team?.abbreviation || ""
    );

    const status = comp.status || {};
    const statusType = status.type?.name || "";
    const minRemaining = getMinutesRemaining(status);

    // Win probability from ESPN (if available)
    let homeWinProb = null;
    if (comp.situation?.lastPlay?.probability?.homeWinPercentage != null) {
      homeWinProb = comp.situation.lastPlay.probability.homeWinPercentage;
    }

    games.push({
      id: event.id,
      homeName, awayName,
      homeScore: parseInt(home.score) || 0,
      awayScore: parseInt(away.score) || 0,
      homeSeed: home.curatedRank?.current || TEAMS[homeName]?.seed,
      awaySeed: away.curatedRank?.current || TEAMS[awayName]?.seed,
      statusType,
      statusText: status.type?.shortDetail || status.type?.detail || "",
      minRemaining,
      homeWinProb,
      period: status.period,
      clock: status.displayClock,
      homeDisplayName: home.team?.displayName || homeName,
      awayDisplayName: away.team?.displayName || awayName,
    });
  }
  return games;
}

async function fetchBoxScore(gameId) {
  const url = `${ESPN_BASE}/summary?event=${gameId}`;
  const data = await fetchWithProxy(url);
  if (!data) return null;

  const playerStats = {};
  for (const team of (data.boxscore?.players || [])) {
    const teamName = resolveTeamName(
      team.team?.displayName || team.team?.name || "",
      team.team?.abbreviation || ""
    );
    for (const group of (team.statistics || [])) {
      const ptsIdx = (group.labels || []).indexOf("PTS");
      if (ptsIdx < 0) continue;
      for (const athlete of (group.athletes || [])) {
        const name = athlete.athlete?.displayName || "";
        const pts = parseInt(athlete.stats?.[ptsIdx]) || 0;
        playerStats[name] = {pts, team:teamName};
      }
    }
  }
  return playerStats;
}

// Match ESPN player names to our player names
function matchPlayerName(espnName, ourPlayers) {
  // Direct match
  const direct = ourPlayers.find(p => p.name === espnName);
  if (direct) return direct;
  // Last name match within same team context
  const espnLast = espnName.split(" ").pop().toLowerCase();
  const matches = ourPlayers.filter(p => {
    const ourLast = p.name.split(" ").pop().toLowerCase();
    return ourLast === espnLast;
  });
  if (matches.length === 1) return matches[0];
  // Fuzzy: check if ESPN name contains our last name
  for (const p of ourPlayers) {
    const parts = p.name.toLowerCase().split(" ");
    if (parts.some(part => espnName.toLowerCase().includes(part) && part.length > 3)) return p;
  }
  return null;
}

async function updateFromESPN() {
  const games = await fetchLiveScores();
  if (!games) {
    updateAPIStatus("offline");
    return;
  }

  let hasLive = false;
  const relevantGameIds = [];

  for (const game of games) {
    const isLive = game.statusType === "STATUS_IN_PROGRESS";
    const isFinal = game.statusType === "STATUS_FINAL";
    if (isLive) hasLive = true;

    // Check if any of our teams are in this game
    for (const teamName of [game.homeName, game.awayName]) {
      if (!teamName || !state.teams[teamName]) continue;

      const oppName = teamName === game.homeName ? game.awayName : game.homeName;
      const teamScore = teamName === game.homeName ? game.homeScore : game.awayScore;
      const oppScore = teamName === game.homeName ? game.awayScore : game.homeScore;
      const isHome = teamName === game.homeName;

      if (isLive) {
        let winProb;
        if (game.homeWinProb != null) {
          winProb = isHome ? game.homeWinProb : 1 - game.homeWinProb;
        } else {
          winProb = calcLiveWinProb(teamScore - oppScore, game.minRemaining);
        }

        state.teams[teamName].currentGame = {
          opponent: oppName,
          teamScore, oppScore,
          minutesRemaining: game.minRemaining,
          winProb,
          period: game.period,
          clock: game.clock
        };

        relevantGameIds.push(game.id);
      } else if (isFinal) {
        state.teams[teamName].currentGame = null;
        if (teamScore > oppScore) {
          // Team won - advance
          // Only update if this is a new result
          const expectedGames = state.teams[teamName].gamesPlayed;
          // Don't re-count if already recorded
        } else {
          state.teams[teamName].status = "eliminated";
        }
      }
    }
  }

  // Fetch box scores for live/final games with our players
  const uniqueIds = [...new Set(relevantGameIds)];
  for (const gid of uniqueIds.slice(0, 5)) { // limit to 5 concurrent
    const boxScore = await fetchBoxScore(gid);
    if (!boxScore) continue;
    for (const [espnName, data] of Object.entries(boxScore)) {
      const teamPlayers = PLAYERS.filter(p => p.team === data.team);
      const matched = matchPlayerName(espnName, teamPlayers);
      if (matched && state.players[matched.name]) {
        state.players[matched.name].currentGamePts = data.pts;
      }
    }
  }

  state.lastESPNUpdate = new Date().toISOString();
  saveState();
  updateAPIStatus(hasLive ? "live" : games.length > 0 ? "idle" : "off");
  render();
}

function updateAPIStatus(status) {
  const dot = document.getElementById("apiDot");
  const txt = document.getElementById("apiStatus");
  dot.className = "status-dot " + status;
  if (status === "live") txt.textContent = "LIVE";
  else if (status === "idle") txt.textContent = "Connected";
  else if (status === "offline") txt.textContent = "Manual Mode";
  else txt.textContent = "Pre-Tournament";

  const upd = document.getElementById("lastUpdate");
  upd.textContent = new Date().toLocaleTimeString();
}

function renderStandings() {
  const standings = calcStandings();
  const maxProj = Math.max(...standings.map(s => s.totalProjected));

  let html = `<table class="standings-table">
    <thead><tr>
      <th style="width:50px"></th><th>Name</th>
      <th class="r">Actual</th><th class="r">Projected</th><th class="r" style="width:120px"></th>
    </tr></thead><tbody>`;

  standings.forEach((s, i) => {
    const rank = i + 1;
    const rankClass = rank <= 3 ? `rank-${rank}` : "rank-other";
    const expanded = expandedOwner === s.owner;
    const hasLive = s.players.some(p => p.status === "live");
    const barPct = maxProj > 0 ? (s.totalProjected / maxProj * 100) : 0;
    const barColor = rank === 1 ? "var(--gold)" : rank === 2 ? "var(--silver)" : rank === 3 ? "var(--bronze)" : "var(--accent)";

    html += `<tr class="standings-row ${expanded?'expanded':''}" onclick="toggleOwner('${s.owner}')">
      <td><div class="rank-badge ${rankClass}">${rank}</div></td>
      <td><div class="owner-name">${s.owner}${hasLive?' <span style="color:var(--live-pulse);font-size:10px">● LIVE</span>':''}</div></td>
      <td class="pts actual"><span class="pts-label">Actual</span>${s.totalActual.toFixed(1)}</td>
      <td class="pts projected"><span class="pts-label">Projected</span>${s.totalProjected.toFixed(1)}</td>
      <td><div class="progress-bar"><div class="progress-fill" style="width:${barPct}%;background:${barColor}"></div></div></td>
    </tr>`;

    // Player detail panel
    html += `<tr><td colspan="5" style="padding:0;border:none"><div class="player-panel ${expanded?'open':''}">`;
    for (const p of s.players) {
      const teamColor = TEAM_COLORS[p.team] || "#555";
      const statusClass = p.status;
      let statusText = "";
      if (p.status === "live") statusText = `🔴 LIVE ${p.minRemaining?.toFixed(0) || ""}m`;
      else if (p.status === "eliminated") statusText = "OUT";
      else if (p.status === "active") statusText = "✓ ALIVE";
      else statusText = "UPCOMING";

      html += `<div class="player-row">
        <div class="player-info">
          <span class="player-team-badge" style="background:${teamColor};color:#fff">${TEAMS[p.team]?.seed || ""} ${p.team}</span>
          <span class="player-name">${p.name}</span>
          <span class="player-ppg">${p.ppg} ppg</span>
        </div>
        <span class="player-status ${statusClass}">${statusText}</span>
        <span class="player-pts">${p.actual > 0 ? p.actual.toFixed(0) : "—"}</span>
        <span class="player-proj">${p.projected.toFixed(1)}</span>
      </div>`;
    }
    html += `</div></td></tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById('standings-panel').innerHTML = html;
}

function renderGames() {
  // Show games by region with team statuses
  const regions = ["East","West","South","Midwest"];
  let html = "";

  for (const region of regions) {
    const regionTeams = Object.entries(TEAMS)
      .filter(([_,t]) => t.region === region)
      .sort((a,b) => a[1].seed - b[1].seed);

    html += `<h3 style="font-family:'Oswald',sans-serif;font-size:16px;text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin:20px 0 12px">${region} Region</h3>`;
    html += `<div class="games-grid">`;

    for (const [name, team] of regionTeams) {
      const ts = state.teams[name];
      const hasDrafted = PLAYERS.some(p => p.team === name);
      const status = ts?.status || "active";
      const gp = ts?.gamesPlayed || 0;
      const expGames = calcExpectedGames(name);
      const color = TEAM_COLORS[name] || "#555";

      let statusBadge = "";
      if (ts?.currentGame) statusBadge = `<span class="game-status-badge live">LIVE</span>`;
      else if (status === "eliminated") statusBadge = `<span class="game-status-badge final">ELIMINATED</span>`;
      else statusBadge = `<span class="game-status-badge upcoming">${gp}W</span>`;

      const opacity = status === "eliminated" ? "0.5" : "1";
      const border = hasDrafted ? `border-left:3px solid ${color}` : "";

      html += `<div class="game-card" style="opacity:${opacity};${border}">
        <div class="game-header">
          <span style="color:${color};font-weight:700">(${team.seed}) ${name}</span>
          ${statusBadge}
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3)">
          <span>Exp Games: ${expGames.toFixed(2)}</span>
          <span>Games Played: ${gp}</span>
        </div>
        ${ts?.currentGame ? `<div style="margin-top:8px;padding:8px;background:var(--surface2);border-radius:6px;font-size:12px">
          <div>vs ${ts.currentGame.opponent}: <strong>${ts.currentGame.teamScore}-${ts.currentGame.oppScore}</strong></div>
          <div style="color:var(--text3)">${ts.currentGame.minutesRemaining?.toFixed(1)}m remaining • Win: ${((ts.currentGame.winProb||0)*100).toFixed(0)}%</div>
        </div>` : ""}
        ${hasDrafted ? `<div style="margin-top:8px;font-size:11px;color:var(--text3)">
          ${PLAYERS.filter(p=>p.team===name).map(p=>`<span style="margin-right:8px">${p.name.split(' ').pop()} (${p.owner})</span>`).join("")}
        </div>` : ""}
      </div>`;
    }
    html += `</div>`;
  }

  document.getElementById('games-panel').innerHTML = html;
}

function renderAdmin() {
  const relevantTeams = [...new Set(PLAYERS.map(p => p.team))].sort();

  let html = `<div class="admin-panel">
    <div class="admin-title">Team Status</div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:12px">Set each team's status and games won. For live games, enter score and time remaining.</p>
    <div class="admin-grid">`;

  for (const team of relevantTeams) {
    const ts = state.teams[team];
    const t = TEAMS[team];
    html += `<div class="admin-team-row">
      <span style="font-weight:600;min-width:110px;font-size:12px">(${t.seed}) ${team}</span>
      <select onchange="updateTeamStatus('${team}',this.value)" style="font-size:11px">
        <option value="active" ${ts.status==='active'?'selected':''}>Active</option>
        <option value="playing" ${ts.currentGame?'selected':''}>Playing</option>
        <option value="eliminated" ${ts.status==='eliminated'?'selected':''}>Eliminated</option>
      </select>
      <label style="font-size:11px;color:var(--text3)">W:</label>
      <input type="number" min="0" max="6" value="${ts.gamesPlayed||0}" onchange="updateTeamGames('${team}',this.value)" style="width:40px">
    </div>`;
  }

  html += `</div></div>`;

  // Live game entry
  html += `<div class="admin-panel">
    <div class="admin-title">Live Game Entry</div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:12px">For teams currently playing, enter game details.</p>
    <div class="admin-grid">`;

  for (const team of relevantTeams) {
    const ts = state.teams[team];
    if (!ts.currentGame && ts.status !== "eliminated") {
      // Show entry fields
    }
    html += `<div class="admin-team-row" style="flex-wrap:wrap">
      <span style="font-weight:600;min-width:100px;font-size:12px">${team}</span>
      <label style="font-size:10px;color:var(--text3)">Score:</label>
      <input type="number" id="live-score-${team.replace(/[^a-zA-Z]/g,'')}" min="0" value="${ts.currentGame?.teamScore||0}" onchange="updateLiveGame('${team}')" style="width:45px">
      <label style="font-size:10px;color:var(--text3)">Opp:</label>
      <input type="number" id="live-opp-${team.replace(/[^a-zA-Z]/g,'')}" min="0" value="${ts.currentGame?.oppScore||0}" onchange="updateLiveGame('${team}')" style="width:45px">
      <label style="font-size:10px;color:var(--text3)">Min left:</label>
      <input type="number" id="live-min-${team.replace(/[^a-zA-Z]/g,'')}" min="0" max="45" step="0.5" value="${ts.currentGame?.minutesRemaining||0}" onchange="updateLiveGame('${team}')" style="width:45px">
    </div>`;
  }

  html += `</div></div>`;

  // Player scores
  html += `<div class="admin-panel">
    <div class="admin-title">Player Scores</div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:12px">Enter points scored per game. Separate multiple games with commas (e.g., "22,18,15"). For live game, use the "Live" field.</p>
    <div class="admin-grid">`;

  for (const p of PLAYERS.sort((a,b) => a.team.localeCompare(b.team) || b.ppg - a.ppg)) {
    const ps = state.players[p.name];
    const completedStr = (ps.completedGamePts||[]).join(",");
    const safeId = p.name.replace(/[^a-zA-Z]/g,'');
    html += `<div class="admin-player-score">
      <span style="min-width:120px;font-size:11px"><strong>${p.name}</strong> <span style="color:var(--text3)">${p.team}</span></span>
      <label style="font-size:10px;color:var(--text3)">Comp:</label>
      <input type="text" id="pscore-${safeId}" value="${completedStr}" placeholder="22,18" onchange="updatePlayerScores('${p.name}','${safeId}')" style="width:70px;font-size:11px">
      <label style="font-size:10px;color:var(--text3)">Live:</label>
      <input type="number" id="plive-${safeId}" value="${ps.currentGamePts||0}" min="0" onchange="updatePlayerLive('${p.name}','${safeId}')" style="width:45px">
    </div>`;
  }

  html += `</div></div>`;

  html += `<div style="display:flex;gap:8px;margin-top:12px">
    <button class="btn active" onclick="saveAllAdmin()">💾 Save All</button>
    <button class="btn" onclick="if(confirm('Reset all scores and statuses?')){state=defaultState();saveState();render();renderAdmin();}">🗑 Reset All</button>
    <button class="btn" onclick="exportState()">📋 Export State</button>
    <button class="btn" onclick="importState()">📥 Import State</button>
  </div>`;

  document.getElementById('admin-panel').innerHTML = html;
}

// ============================================================
// ADMIN HANDLERS
// ============================================================
function toggleOwner(owner) {
  expandedOwner = expandedOwner === owner ? null : owner;
  renderStandings();
}

function updateTeamStatus(team, status) {
  if (status === "playing") {
    state.teams[team].status = "active";
    state.teams[team].currentGame = state.teams[team].currentGame || {teamScore:0,oppScore:0,minutesRemaining:40,opponent:"TBD"};
  } else {
    state.teams[team].status = status;
    if (status !== "active") state.teams[team].currentGame = null;
    else state.teams[team].currentGame = null;
  }
  saveState(); render();
}

function updateTeamGames(team, val) {
  state.teams[team].gamesPlayed = parseInt(val) || 0;
  saveState(); render();
}

function updateLiveGame(team) {
  const safe = team.replace(/[^a-zA-Z]/g,'');
  const score = parseInt(document.getElementById(`live-score-${safe}`)?.value) || 0;
  const opp = parseInt(document.getElementById(`live-opp-${safe}`)?.value) || 0;
  const min = parseFloat(document.getElementById(`live-min-${safe}`)?.value) || 0;

  if (score > 0 || opp > 0 || min > 0) {
    const margin = score - opp;
    state.teams[team].currentGame = {
      teamScore: score, oppScore: opp,
      minutesRemaining: min,
      winProb: calcLiveWinProb(margin, min),
      opponent: "Opponent"
    };
  } else {
    state.teams[team].currentGame = null;
  }
  saveState(); render();
}

function updatePlayerScores(name, safeId) {
  const val = document.getElementById(`pscore-${safeId}`)?.value || "";
  const pts = val.split(",").map(s => parseFloat(s.trim())).filter(n => !isNaN(n));
  state.players[name].completedGamePts = pts;
  saveState(); render();
}

function updatePlayerLive(name, safeId) {
  const val = parseInt(document.getElementById(`plive-${safeId}`)?.value) || 0;
  state.players[name].currentGamePts = val;
  saveState(); render();
}

function saveAllAdmin() {
  // Re-read all admin fields
  const relevantTeams = [...new Set(PLAYERS.map(p => p.team))];
  for (const p of PLAYERS) {
    const safeId = p.name.replace(/[^a-zA-Z]/g,'');
    const compEl = document.getElementById(`pscore-${safeId}`);
    const liveEl = document.getElementById(`plive-${safeId}`);
    if (compEl) {
      const pts = compEl.value.split(",").map(s=>parseFloat(s.trim())).filter(n=>!isNaN(n));
      state.players[p.name].completedGamePts = pts;
    }
    if (liveEl) {
      state.players[p.name].currentGamePts = parseInt(liveEl.value) || 0;
    }
  }
  for (const team of relevantTeams) {
    updateLiveGame(team);
  }
  saveState(); render();
  alert("Saved!");
}

function exportState() {
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "mm_pool_state.json"; a.click();
  URL.revokeObjectURL(url);
}

function importState() {
  const input = document.createElement("input");
  input.type = "file"; input.accept = ".json";
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    const text = await file.text();
    try {
      const imported = JSON.parse(text);
      state = imported;
      saveState(); render();
      if (currentTab === 'admin') renderAdmin();
      alert("State imported!");
    } catch(e) { alert("Invalid JSON file"); }
  };
  input.click();
}

async function manualRefresh() {
  document.getElementById("refreshBtn").textContent = "⏳ Loading...";
  await updateFromESPN();
  document.getElementById("refreshBtn").textContent = "↻ Refresh";
}

// ============================================================
// INIT & AUTO-REFRESH
// ============================================================
render();

// Try ESPN on load
setTimeout(() => updateFromESPN(), 1000);

// Auto-refresh every 60 seconds
setInterval(() => {
  updateFromESPN();
}, 60000);
</script>

</html>
